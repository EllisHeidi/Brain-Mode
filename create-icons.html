<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate BrainFiles Icons</title>
<style>
  body { font-family: sans-serif; background: #272b33; color: #e2e4ea; padding: 40px; text-align: center; }
  h2 { color: #4a7cf7; margin-bottom: 8px; }
  p { color: #9499a8; margin-bottom: 28px; }
  canvas { border-radius: 12px; margin: 10px; display: block; }
  .btn { background: #4a7cf7; color: #fff; border: none; padding: 12px 28px; border-radius: 8px; cursor: pointer; font-size: 15px; margin-top: 10px; }
  .btn:hover { background: #3a6cf7; }
  .btn:disabled { background: #444; cursor: default; }
  .row { display: flex; align-items: flex-end; justify-content: center; gap: 40px; flex-wrap: wrap; margin: 20px 0; }
  .col { display: flex; flex-direction: column; align-items: center; }
  label { color: #9499a8; font-size: 13px; margin-bottom: 6px; }
</style>
</head>
<body>
<h2>BrainFiles Icon Generator</h2>
<p>Download both icons and save them in the same folder as index.html.</p>
<div class="row">
  <div class="col">
    <label>192 × 192</label>
    <canvas id="c192" width="192" height="192"></canvas>
    <button class="btn" id="btn192" onclick="dl(192)" disabled>Download icon-192.png</button>
  </div>
  <div class="col">
    <label>512 × 512</label>
    <canvas id="c512" width="512" height="512"></canvas>
    <button class="btn" id="btn512" onclick="dl(512)" disabled>Download icon-512.png</button>
  </div>
</div>
<script>
const SRC = 'human-brain-icon-in-solid-black-side-view-on-white-background-illustration-vector.jpg';

function drawIcon(size, img) {
  const c = document.getElementById('c' + size);
  const ctx = c.getContext('2d');
  const u = size / 100;

  ctx.clearRect(0, 0, size, size);

  // Rounded square clip mask
  const br = u * 18;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(br, 0); ctx.lineTo(size - br, 0);
  ctx.arcTo(size, 0, size, br, br);
  ctx.lineTo(size, size - br);
  ctx.arcTo(size, size, size - br, size, br);
  ctx.lineTo(br, size);
  ctx.arcTo(0, size, 0, size - br, br);
  ctx.lineTo(0, br);
  ctx.arcTo(0, 0, br, 0, br);
  ctx.closePath();
  ctx.clip();

  // Dark background
  ctx.fillStyle = '#1e2128';
  ctx.fillRect(0, 0, size, size);

  // Draw the source image onto a temp canvas so we can recolour it
  const pad = u * 10;
  const drawW = size - pad * 2;
  const drawH = size - pad * 2;

  const tmp = document.createElement('canvas');
  tmp.width = size; tmp.height = size;
  const tctx = tmp.getContext('2d');

  // Draw image centred with padding
  tctx.drawImage(img, pad, pad, drawW, drawH);

  // Recolour: black pixels → accent blue (#4a7cf7), white → transparent
  const id = tctx.getImageData(0, 0, size, size);
  const d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const brightness = (d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114);
    // Dark pixels become the accent colour; light pixels become transparent
    const alpha = Math.round(255 - brightness);
    d[i]   = 74;   // R  — #4a7cf7
    d[i+1] = 124;  // G
    d[i+2] = 247;  // B
    d[i+3] = alpha;
  }
  tctx.putImageData(id, 0, 0);

  // Composite recoloured brain onto the dark background
  ctx.drawImage(tmp, 0, 0);
  ctx.restore();
}

const img = new Image();
img.onload = function() {
  drawIcon(192, img);
  drawIcon(512, img);
  document.getElementById('btn192').disabled = false;
  document.getElementById('btn512').disabled = false;
};
img.onerror = function() {
  document.querySelector('p').textContent = 'Could not load ' + SRC + ' — make sure it is in the same folder as this file.';
};
img.src = SRC;

function dl(size) {
  const a = document.createElement('a');
  a.href = document.getElementById('c' + size).toDataURL('image/png');
  a.download = 'icon-' + size + '.png';
  a.click();
}
</script>
</body>
</html>
